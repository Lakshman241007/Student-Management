<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VelsPortal — Admin Control Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #030507;
            --surface: rgba(10, 4, 4, .95);
            --border: rgba(239, 68, 68, .14);
            --red: #ef4444;
            --rose: #fb7185;
            --orange: #f97316;
            --text: #fff1f2;
            --dim: rgba(255, 241, 242, .52);
            --faint: rgba(255, 241, 242, .22);
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        canvas#ptc {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, .022) 2px, rgba(0, 0, 0, .022) 4px);
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background: radial-gradient(ellipse 85% 85% at 50% 50%, transparent 48%, rgba(0, 0, 0, .6) 100%);
        }

        .wrap {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 26px;
            padding: 32px 20px;
            animation: rise .85s cubic-bezier(.16, 1, .3, 1) both;
        }

        @keyframes rise {
            from {
                opacity: 0;
                transform: translateY(28px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, rgba(239, 68, 68, .12), rgba(249, 115, 22, .07));
            border: 1px solid rgba(239, 68, 68, .3);
            border-radius: 100px;
            padding: 7px 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: .61rem;
            color: var(--rose);
            letter-spacing: 3px;
            text-transform: uppercase;
            box-shadow: 0 0 28px rgba(239, 68, 68, .12);
            animation: gpulse 3s ease-in-out infinite;
        }

        @keyframes gpulse {

            0%,
            100% {
                box-shadow: 0 0 24px rgba(239, 68, 68, .1);
            }

            50% {
                box-shadow: 0 0 52px rgba(239, 68, 68, .3), 0 0 90px rgba(249, 115, 22, .08);
            }
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--red);
            animation: blink 1.4s steps(1) infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0
            }
        }

        .title {
            text-align: center;
        }

        .title-main {
            font-size: clamp(1.9rem, 5vw, 3rem);
            font-weight: 800;
            letter-spacing: -1.5px;
            line-height: 1;
            background: linear-gradient(135deg, #ff8080 0%, #ef4444 28%, #dc2626 52%, #ea580c 78%, #fb923c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 32px rgba(239, 68, 68, .3));
        }

        .title-sub {
            margin-top: 9px;
            font-size: .7rem;
            color: var(--faint);
            letter-spacing: 2.5px;
            text-transform: uppercase;
            font-weight: 500;
            font-family: 'JetBrains Mono', monospace;
        }

        .card {
            width: 100%;
            max-width: 410px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 36px 36px 30px;
            backdrop-filter: blur(28px);
            box-shadow: 0 0 0 1px rgba(239, 68, 68, .03), 0 50px 100px rgba(0, 0, 0, .8), 0 0 60px rgba(239, 68, 68, .03) inset;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(239, 68, 68, .6), rgba(249, 115, 22, .4), transparent);
        }

        .card::after {
            content: '';
            position: absolute;
            top: -80px;
            right: -80px;
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(239, 68, 68, .05) 0%, transparent 65%);
            pointer-events: none;
        }

        .card-icon {
            width: 54px;
            height: 54px;
            border-radius: 16px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, rgba(239, 68, 68, .2), rgba(249, 115, 22, .12));
            border: 1px solid rgba(239, 68, 68, .3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 6px 28px rgba(239, 68, 68, .22);
        }

        .card-head {
            text-align: center;
            margin-bottom: 26px;
        }

        .card-title {
            font-size: 1.22rem;
            font-weight: 800;
            color: var(--text);
            letter-spacing: -.3px;
            margin-bottom: 5px;
        }

        .card-desc {
            font-size: .74rem;
            color: var(--faint);
            font-weight: 400;
        }

        .fg {
            margin-bottom: 15px;
        }

        .fl {
            display: block;
            font-size: .61rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--faint);
            margin-bottom: 7px;
            font-family: 'JetBrains Mono', monospace;
        }

        .fi {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, .03);
            border: 1px solid rgba(239, 68, 68, .13);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: .84rem;
            font-weight: 500;
            outline: none;
            transition: border-color .2s, box-shadow .2s, background .2s;
        }

        .fi::placeholder {
            color: rgba(255, 241, 242, .18);
        }

        .fi:focus {
            border-color: var(--red);
            background: rgba(239, 68, 68, .05);
            box-shadow: 0 0 0 3px rgba(239, 68, 68, .13);
        }

        .fi.err {
            border-color: #f87171 !important;
            box-shadow: 0 0 0 3px rgba(248, 113, 113, .14) !important;
            animation: shake .35s ease;
        }

        .pwd-wrap {
            position: relative;
        }

        .pwd-wrap .fi {
            padding-right: 46px;
        }

        .eye {
            position: absolute;
            right: 13px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--faint);
            display: flex;
            align-items: center;
            padding: 4px;
            transition: color .2s;
        }

        .eye:hover {
            color: var(--rose);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ef4444, #dc2626 55%, #b91c1c);
            border: none;
            border-radius: 11px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: .92rem;
            font-weight: 800;
            color: #fff;
            cursor: pointer;
            letter-spacing: .2px;
            transition: transform .25s, box-shadow .25s, opacity .2s;
            box-shadow: 0 6px 30px rgba(239, 68, 68, .42), 0 2px 0 rgba(255, 120, 120, .12) inset;
            margin-top: 6px;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(239, 68, 68, .55);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: .6;
            cursor: not-allowed;
            transform: none;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .22), transparent);
            transition: left .5s;
        }

        .btn:hover::after {
            left: 100%;
        }

        .err-box {
            display: none;
            margin-top: 12px;
            padding: 10px 14px;
            background: rgba(239, 68, 68, .08);
            border: 1px solid rgba(239, 68, 68, .22);
            border-radius: 9px;
            color: #fca5a5;
            font-size: .76rem;
            text-align: center;
            font-weight: 500;
        }

        .sec-note {
            margin-top: 18px;
            padding: 10px 14px;
            background: rgba(239, 68, 68, .04);
            border: 1px solid rgba(239, 68, 68, .1);
            border-radius: 9px;
            text-align: center;
            font-size: .66rem;
            color: var(--faint);
            font-family: 'JetBrains Mono', monospace;
        }

        .back {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--faint);
            font-size: .75rem;
            text-decoration: none;
            transition: color .2s;
            font-weight: 500;
        }

        .back:hover {
            color: var(--rose);
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0)
            }

            20% {
                transform: translateX(-6px)
            }

            40% {
                transform: translateX(6px)
            }

            60% {
                transform: translateX(-4px)
            }

            80% {
                transform: translateX(4px)
            }
        }

        /* ── STEP PROGRESS ────────────────────────────── */
        .login-steps {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            margin-top: 13px;
            min-height: 18px;
            opacity: 0;
            transition: opacity .3s;
        }

        .login-steps.show {
            opacity: 1;
        }

        .ls-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(239, 68, 68, .18);
            transition: background .3s, transform .3s;
        }

        .ls-dot.done {
            background: var(--red);
            transform: scale(1.3);
        }

        .ls-dot.act {
            background: var(--rose);
            animation: ls-beat .65s ease-in-out infinite;
        }

        @keyframes ls-beat {

            0%,
            100% {
                opacity: .35;
                transform: scale(1)
            }

            50% {
                opacity: 1;
                transform: scale(1.5)
            }
        }

        .ls-label {
            font-size: .63rem;
            color: rgba(255, 241, 242, .32);
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: .5px;
            margin-left: 4px;
        }

        /* Progress fill bar inside button */
        .btn-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 2px;
            width: 0%;
            background: rgba(255, 255, 255, .4);
            border-radius: 0 0 11px 11px;
            transition: width .45s cubic-bezier(.4, 0, .2, 1);
        }

        /* Card goes green on success */
        .card.success-flash {
            border-color: rgba(52, 211, 153, .28) !important;
            box-shadow: 0 0 0 1px rgba(52, 211, 153, .12),
                0 50px 100px rgba(0, 0, 0, .8),
                0 0 50px rgba(52, 211, 153, .08) inset !important;
            transition: border-color .4s ease, box-shadow .4s ease;
        }

        /* Label tints red on input focus */
        .fg:focus-within .fl {
            color: var(--rose);
            transition: color .2s;
        }
    </style>
</head>

<body>
    <canvas id="ptc"></canvas>
    <div class="wrap">
        <div class="badge">
            <div class="dot"></div>Restricted Access · Admin Only<div class="dot"></div>
        </div>
        <div class="title">
            <div class="title-main">VelsPortal Admin</div>
            <div class="title-sub">Control Center · Authorised Personnel Only</div>
        </div>
        <div class="card" id="loginCard">
            <div class="card-icon">🛡️</div>
            <div class="card-head">
                <div class="card-title">Administrator Login</div>
                <div class="card-desc">Enter credentials to access the management console</div>
            </div>
            <div class="fg"><label class="fl" for="auid">Admin ID</label><input class="fi" id="auid" type="text"
                    placeholder="e.g. ADMIN001" autocomplete="off"></div>
            <div class="fg"><label class="fl" for="apwd">Password</label>
                <div class="pwd-wrap">
                    <input class="fi" id="apwd" type="password" placeholder="Enter admin password">
                    <button class="eye" onclick="toggleEye()" type="button">
                        <svg id="eyeO" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>
                        <svg id="eyeC" style="display:none" width="17" height="17" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" />
                            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" />
                            <line x1="1" y1="1" x2="23" y2="23" />
                        </svg>
                    </button>
                </div>
            </div>
            <button class="btn" id="loginBtn" onclick="doLogin()">
                Access Admin Panel →
                <div class="btn-bar" id="btnBar"></div>
            </button>
            <div class="login-steps" id="loginSteps">
                <div class="ls-dot" id="lsd0"></div>
                <div class="ls-dot" id="lsd1"></div>
                <div class="ls-dot" id="lsd2"></div>
                <span class="ls-label" id="lsLabel"></span>
            </div>
            <div class="err-box" id="errBox"></div>
            <div class="sec-note">🔒 &nbsp;Secured session · All actions are logged to Supabase</div>
        </div>
        <a class="back" href="index.html">← Back to Student / Teacher Login</a>
    </div>
    <script>
        (function () {
            const cv = document.getElementById('ptc'), ctx = cv.getContext('2d');
            let W, H, mx = -9e3, my = -9e3;
            const ps = [];
            function rsz() { W = cv.width = innerWidth; H = cv.height = innerHeight; }
            addEventListener('resize', rsz); rsz();
            addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
            const COLS = [[239, 68, 68], [220, 38, 38], [249, 115, 22], [251, 113, 133], [248, 113, 113], [255, 90, 70], [180, 20, 20], [253, 164, 175]];
            class P {
                constructor(init) { this.sp(init); }
                sp(init) {
                    this.x = Math.random() * W; this.y = init ? Math.random() * H : H + 8;
                    this.vx = (Math.random() - .5) * .5; this.vy = -(Math.random() * .65 + .15);
                    this.r = Math.random() * 1.7 + .35; this.lf = 0; this.mlf = 200 + Math.random() * 300;
                    this.c = COLS[Math.floor(Math.random() * COLS.length)]; this.spin = (Math.random() - .5) * .018;
                }
                upd() {
                    this.lf++;
                    const dx = this.x - mx, dy = this.y - my, d = Math.sqrt(dx * dx + dy * dy);
                    if (d < 110) { const f = (110 - d) / 110 * .85; this.vx += dx / d * f * .048; this.vy += dy / d * f * .048; }
                    this.vx += this.spin; this.vx *= .988; this.vy *= .991;
                    this.x += this.vx; this.y += this.vy;
                    if (this.lf >= this.mlf || this.y < -14 || this.x < -14 || this.x > W + 14) this.sp(false);
                }
                drw() {
                    const a = Math.min(1, Math.min(this.lf, this.mlf - this.lf) / 42) * .68;
                    const [r, g, b] = this.c;
                    ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${r},${g},${b},${a})`; ctx.fill();
                }
            }
            for (let i = 0; i < 220; i++)ps.push(new P(true));
            function lines() {
                for (let i = 0; i < ps.length; i++) {
                    for (let j = i + 1; j < ps.length; j++) {
                        const dx = ps[i].x - ps[j].x, dy = ps[i].y - ps[j].y, d = Math.sqrt(dx * dx + dy * dy);
                        if (d < 85) { const [r, g, b] = ps[i].c; ctx.beginPath(); ctx.moveTo(ps[i].x, ps[i].y); ctx.lineTo(ps[j].x, ps[j].y); ctx.strokeStyle = `rgba(${r},${g},${b},${(1 - d / 85) * .08})`; ctx.lineWidth = .55; ctx.stroke(); }
                    }
                }
            }
            let bt = 0;
            function loop() {
                ctx.clearRect(0, 0, W, H); ps.forEach(p => { p.upd(); p.drw(); }); lines();
                bt++; if (bt % 130 === 0 && mx > 0) { for (let i = 0; i < 4; i++) { const p = ps[Math.floor(Math.random() * ps.length)]; p.x = mx + (Math.random() - .5) * 50; p.y = my + (Math.random() - .5) * 50; p.vx = (Math.random() - .5) * 3; p.vy = (Math.random() - .5) * 3; p.lf = 0; p.mlf = 70 + Math.random() * 60; } }
                requestAnimationFrame(loop);
            }
            loop();
        })();

        function toggleEye() { const i = document.getElementById('apwd'), h = i.type === 'password'; i.type = h ? 'text' : 'password'; document.getElementById('eyeO').style.display = h ? 'none' : 'block'; document.getElementById('eyeC').style.display = h ? 'block' : 'none'; }

        const API = 'https://student-management-production-a94b.up.railway.app';
        /* ── Step-progress helpers ── */
        function setSteps(step, label) {
            const steps = document.getElementById('loginSteps');
            steps.classList.add('show');
            document.getElementById('lsLabel').textContent = label || '';
            [0, 1, 2].forEach(i => {
                const d = document.getElementById('lsd' + i);
                d.className = 'ls-dot';
                if (i < step) d.classList.add('done');
                else if (i === step) d.classList.add('act');
            });
            const bar = document.getElementById('btnBar');
            if (bar) bar.style.width = ['12%', '55%', '88%', '100%'][Math.min(step, 3)];
        }
        function clearSteps() {
            const steps = document.getElementById('loginSteps');
            if (steps) steps.classList.remove('show');
            const bar = document.getElementById('btnBar');
            if (bar) bar.style.width = '0%';
        }

        async function doLogin() {
            const uid = document.getElementById('auid').value.trim().toUpperCase();
            const pwd = document.getElementById('apwd').value;
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('errBox');
            const card = document.getElementById('loginCard');
            err.style.display = 'none';
            ['auid', 'apwd'].forEach(id => document.getElementById(id).classList.remove('err'));
            if (!uid) { showErr('Please enter your Admin ID.'); document.getElementById('auid').classList.add('err'); return; }
            if (!pwd) { showErr('Please enter your password.'); document.getElementById('apwd').classList.add('err'); return; }

            btn.textContent = 'Connecting…'; btn.disabled = true;
            setSteps(0, 'Connecting');

            try {
                setSteps(1, 'Verifying');
                btn.textContent = 'Verifying credentials…';
                const res = await fetch(`${API}/api/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ admin_id: uid, password: pwd })
                });
                const data = await res.json().catch(() => ({}));
                if (!res.ok) {
                    clearSteps();
                    ['auid', 'apwd'].forEach(id => document.getElementById(id).classList.add('err'));
                    document.getElementById('apwd').value = '';
                    showErr(data.detail || '❌ Invalid Admin ID or Password.');
                    card.style.animation = 'none';
                    requestAnimationFrame(() => { card.style.animation = 'shake .4s ease'; });
                    setTimeout(() => card.style.animation = '', 450);
                    btn.textContent = 'Access Admin Panel →'; btn.disabled = false;
                    document.getElementById('auid').focus(); return;
                }
                setSteps(2, 'Authenticated');
                btn.textContent = 'Loading dashboard…';
                sessionStorage.setItem('adminToken', data.token);
                sessionStorage.setItem('adminId', data.admin_id);
                sessionStorage.setItem('adminName', data.name);
                sessionStorage.setItem('token', data.token);
                setTimeout(() => {
                    setSteps(3, '');
                    card.classList.add('success-flash');
                    btn.textContent = '✓ Access Granted — Redirecting…';
                    setTimeout(() => window.location.href = 'management.html', 700);
                }, 300);
            } catch (e) {
                clearSteps();
                showErr('Connection failed. Is the server running?');
                btn.textContent = 'Access Admin Panel →'; btn.disabled = false;
            }
        }
        function showErr(msg) { const e = document.getElementById('errBox'); e.textContent = msg; e.style.display = 'block'; }
        document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
        window.addEventListener('load', () => document.getElementById('auid').focus());
    </script>
</body>

</html>
